<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnappyShare - Secure & Fast File Sharing</title>
    <meta name="description" content="Upload and share your files instantly. Simple, fast, and secure temporary file sharing.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="container">
        <header class="app-header">
            <h1>SnappyShare</h1>
            <p>Upload and share files instantly.</p>
        </header>

        <section class="upload-card">
            <div id="drop-zone" class="drop-zone">
                <div class="drop-zone-content">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="upload-icon"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    <h2>Drag & Drop your file here</h2>
                    <p>or</p>
                    <label for="file-input" class="btn-primary">Browse Files</label>
                    <input type="file" id="file-input" hidden>
                </div>
            </div>

            <div id="upload-progress-container" class="progress-container hidden">
                <div class="progress-info">
                    <span id="file-name-display" class="file-name">filename.ext</span>
                    <span id="progress-text" class="progress-percent">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div id="progress-bar" class="progress-bar-fill"></div>
                </div>
            </div>

            <div id="result-container" class="result-container hidden">
                <div class="success-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#2ecc71" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                </div>
                <h3>Upload Complete!</h3>
                <p>Your file is ready to share.</p>
                <div class="url-box">
                    <input type="text" id="file-url" readonly>
                    <button id="copy-btn" class="btn-icon" title="Copy to clipboard">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>
                </div>
                <button id="upload-another-btn" class="btn-secondary">Upload Another</button>
            </div>
            
            <div id="error-message" class="error-message hidden"></div>
        </section>

        <div class="storage-stats hidden" id="storage-stats">
            <div class="storage-text">Storage Pool: <span id="storage-used">0 GB</span> / <span id="storage-limit">5 GB</span></div>
            <div class="storage-bar-bg">
                <div class="storage-bar-fill" id="storage-bar"></div>
            </div>
        </div>

        <footer class="app-footer">
            <p>By uploading, you agree to our <a href="/tos.html">Terms of Service</a>.</p>
        </footer>
    </main>

    <script src="app.js"></script>
</body>
</html>
